services:
  - type: web
    name: airserve-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn appointment_scheduling.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: ONEMAP_API_KEY
        sync: false
